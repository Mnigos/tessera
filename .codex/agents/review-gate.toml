path = ".agents/skills/web-app-patterns/SKILL.md"
enabled = true

[[skills.config]]
path = ".agents/skills/database-patterns/SKILL.md"
enabled = true

[[skills.config]]
path = ".agents/skills/orpc-contracts/SKILL.md"
enabled = true

