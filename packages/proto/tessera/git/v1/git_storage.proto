syntax = "proto3";

package tessera.git.v1;

service GitStorageService {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc CreateRepository(CreateRepositoryRequest) returns (CreateRepositoryResponse);
  rpc GetRepositoryBrowserSummary(GetRepositoryBrowserSummaryRequest) returns (GetRepositoryBrowserSummaryResponse);
  rpc GetRepositoryTree(GetRepositoryTreeRequest) returns (GetRepositoryTreeResponse);
  rpc GetRepositoryBlob(GetRepositoryBlobRequest) returns (GetRepositoryBlobResponse);
  rpc GetRepositoryRawBlob(GetRepositoryRawBlobRequest) returns (GetRepositoryRawBlobResponse);
  rpc ListRepositoryCommits(ListRepositoryCommitsRequest) returns (ListRepositoryCommitsResponse);
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
}

message CreateRepositoryRequest {
  string repository_id = 1;
}

message CreateRepositoryResponse {
  string storage_path = 1;
}

message GetRepositoryBrowserSummaryRequest {
  string repository_id = 1;
  string storage_path = 2;
  string default_branch = 3;
}

message GetRepositoryBrowserSummaryResponse {
  bool is_empty = 1;
  string default_branch = 2;
  repeated RepositoryTreeEntry root_entries = 3;
  RepositoryReadme readme = 4;
}

message GetRepositoryTreeRequest {
  string repository_id = 1;
  string storage_path = 2;
  string ref = 3;
  string path = 4;
}

message GetRepositoryTreeResponse {
  string commit_id = 1;
  string path = 2;
  repeated RepositoryTreeEntry entries = 3;
}

message GetRepositoryBlobRequest {
  string repository_id = 1;
  string storage_path = 2;
  string object_id = 3;
}

message GetRepositoryBlobResponse {
  string object_id = 1;
  RepositoryBlobPreviewState state = 2;
  string text = 3;
  uint64 size_bytes = 4;
  uint64 preview_limit_bytes = 5;
}

message GetRepositoryRawBlobRequest {
  string repository_id = 1;
  string storage_path = 2;
  string object_id = 3;
}

message GetRepositoryRawBlobResponse {
  string object_id = 1;
  bytes content = 2;
  uint64 size_bytes = 3;
}

message ListRepositoryCommitsRequest {
  string repository_id = 1;
  string storage_path = 2;
  string ref = 3;
  uint32 limit = 4;
}

message ListRepositoryCommitsResponse {
  repeated RepositoryCommit commits = 1;
}

message RepositoryCommit {
  string sha = 1;
  string short_sha = 2;
  string summary = 3;
  RepositoryCommitIdentity author = 4;
  RepositoryCommitIdentity committer = 5;
}

message RepositoryCommitIdentity {
  string name = 1;
  string email = 2;
  string date = 3;
}

message RepositoryTreeEntry {
  string name = 1;
  string object_id = 2;
  RepositoryTreeEntryKind kind = 3;
  uint64 size_bytes = 4;
  string path = 5;
  string mode = 6;
}

enum RepositoryTreeEntryKind {
  REPOSITORY_TREE_ENTRY_KIND_UNSPECIFIED = 0;
  REPOSITORY_TREE_ENTRY_KIND_FILE = 1;
  REPOSITORY_TREE_ENTRY_KIND_DIRECTORY = 2;
  REPOSITORY_TREE_ENTRY_KIND_SYMLINK = 3;
  REPOSITORY_TREE_ENTRY_KIND_SUBMODULE = 4;
}

message RepositoryReadme {
  string filename = 1;
  string object_id = 2;
  bytes content = 3;
  bool is_truncated = 4;
}

enum RepositoryBlobPreviewState {
  REPOSITORY_BLOB_PREVIEW_STATE_UNSPECIFIED = 0;
  REPOSITORY_BLOB_PREVIEW_STATE_TEXT = 1;
  REPOSITORY_BLOB_PREVIEW_STATE_BINARY = 2;
  REPOSITORY_BLOB_PREVIEW_STATE_TOO_LARGE = 3;
}
