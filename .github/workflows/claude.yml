name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      id-token: write
      contents: write
      pull-requests: write
      repository-projects: write
      actions: read
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup 👨🏻‍💻
        uses: ./.github/actions/setup

      - name: Run Claude PR Action
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          timeout_minutes: 15
          custom_instructions: 'You have also been granted tools for editing files and running bun commands (install, run, test, typecheck, check) for testing your changes: bun install, bun test, bun run check, bun run typecheck. You also have access to Context7 for documentation, and A11y for accessibility testing.'
          allowed_tools: 'Bash,Bash(bun install),Bash(bun run check),Bash(bun run test),Bash(bun run typecheck),bun,mcp__github__create_or_update_file,mcp__github__get_code_scanning_alert,mcp__github__get_commit,mcp__github__get_file_contents,mcp__github__get_issue,mcp__github__get_issue_comments,mcp__github__get_me,mcp__github__get_notification_details,mcp__github__get_pull_request,mcp__github__get_pull_request_comments,mcp__github__get_pull_request_diff,mcp__github__get_pull_request_files,mcp__github__get_pull_request_reviews,mcp__github__get_pull_request_status,mcp__github__get_secret_scanning_alert,mcp__github__get_tag,mcp__github__list_branches,mcp__github__list_code_scanning_alerts,mcp__github__list_commits,mcp__github__list_issues,mcp__github__list_notifications,mcp__github__list_pull_requests,mcp__github__list_secret_scanning_alerts,mcp__github__list_tags,mcp__github__search_code,mcp__github__search_issues,mcp__github__search_repositories,mcp__github__search_users,mcp__github__list_workflow_runs,mcp__github__get_workflow_run,mcp__github__download_workflow_run_logs,mcp__github__create_issue,mcp__github__create_pull_request,mcp__github__add_comment_to_issue,mcp__github__add_comment_to_pull_request,mcp__context7__resolve-library-id,mcp__context7__get-library-docs,mcp__a11y__audit_webpage,mcp__a11y__get_summary,mcp__sentry__whoami,mcp__sentry__find_organizations,mcp__sentry__find_teams,mcp__sentry__find_projects,mcp__sentry__find_releases,mcp__sentry__get_issue_details,mcp__sentry__get_trace_details,mcp__sentry__get_event_attachment,mcp__sentry__search_events,mcp__sentry__find_dsns,mcp__sentry__search_docs,mcp__sentry__get_doc,mcp__sentry__search_issues,mcp__sentry__use_sentry'
