services:
  tessera-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    env_file:
      - path: .env
        required: false
    command: bun run --filter @repo/api dev
    ports:
      - ${PORT:-4000}:${PORT:-4000}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
    working_dir: /app
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: bitnami/postgresql:latest
    ports:
      - ${DATABASE_PORT:-5432}:5432
    environment:
      POSTGRESQL_USERNAME: ${DATABASE_USERNAME:-tessera}
      POSTGRESQL_PASSWORD: ${DATABASE_PASSWORD:-tessera}
      POSTGRESQL_DATABASE: ${DATABASE_NAME:-tessera}
    volumes:
      - 'postgresql_data:/bitnami/postgresql'

  redis:
    image: bitnami/redis:latest
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    ports:
      - ${S3_PORT:-9000}:9000
      - ${S3_CONSOLE_PORT:-9001}:9001
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - 'minio_data:/data'

volumes:
  postgresql_data:
    driver: local
  minio_data:
    driver: local
