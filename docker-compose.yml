services:
  tessera-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    env_file:
      - path: .env
        required: false
    command: bun run --filter @repo/api dev
    ports:
      - ${PORT:-4000}:${PORT:-4000}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
    working_dir: /app
    depends_on:
      - postgres
      - redis

  postgres:
    image: bitnami/postgresql:latest
    ports:
      - ${DATABASE_PORT:-5432}:5432
    environment:
      POSTGRESQL_USERNAME: ${DATABASE_USERNAME:-tessera}
      POSTGRESQL_PASSWORD: ${DATABASE_PASSWORD:-tessera}
      POSTGRESQL_DATABASE: ${DATABASE_NAME:-tessera}
    volumes:
      - 'postgresql_data:/bitnami/postgresql'

  redis:
    image: bitnami/redis:latest
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - '6379:6379'

volumes:
  postgresql_data:
    driver: local
